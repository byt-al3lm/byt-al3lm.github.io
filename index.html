<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بيت العلم | موسوعة الأسئلة والأجوبة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #e2e8f0; }
        .header-bg { background-color: #2b4c65; }
        .blue-box { background-color: #2b4c65; }
        .green-box { background-color: #22c55e; }
    </style>
</head>
<body>

    <!-- الهيدر -->
    <header class="header-bg text-white p-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">بيت العلم</h1>
            <nav class="flex gap-4 text-sm">
                <a href="#">الأسئلة</a>
                <a href="#">الوسوم</a>
            </nav>
        </div>
    </header>

    <div class="max-w-5xl mx-auto p-4 flex flex-col md:flex-row gap-4 mt-4">
        <!-- القائمة الجانبية -->
        <aside class="w-full md:w-1/3 space-y-4">
            <div class="bg-white p-2 border border-slate-300 rounded">
                <input type="text" id="search-input" placeholder="بحث..." class="w-full p-2 outline-none">
            </div>
            <div class="bg-[#2b4c65] text-white p-4 text-sm rounded">
                مرحباً بك في بيت العلم، حيث يمكنك طرح الأسئلة وانتظار الإجابة عليها من المستخدمين الآخرين.
            </div>
        </aside>

        <!-- المحتوى الرئيسي -->
        <main class="flex-1 space-y-3">
            <div class="bg-[#3b82f6] text-white p-2 text-sm font-bold rounded-t-lg">آخر الأسئلة والإجابات</div>
            <div id="questions-list" class="space-y-3"></div>
        </main>
    </div>

    <script src="add.js"></script>
</body>
</html>
